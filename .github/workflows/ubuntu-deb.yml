name: Ubuntu DEB

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    uses: ./.github/workflows/build.yml
    with:
      platform: ubuntu-22.04
      target: x86_64-unknown-linux-gnu
      build-args: --bundles deb
      sign-binaries: false
      asset-prefix: handy-ubuntu
      upload-artifacts: true
      is-debug-build: false
